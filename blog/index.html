<p>天天使用<code v-pre>npm</code>下包，有没有考虑是如果实现的。对于日常使用频率高的组件、方法等，来回的复制代码就很不方便，既然如此就开发一个通用的仓库，以后可以随时随地使用。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/oauth.png" alt="第三方授权登录" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/kacy2gnx/" data-v-372ae5d5 data-v-bb18f006><!--[-->第三方授权登录<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-a34i" href="/blog/tags/?tag=oauth" data-v-372ae5d5 data-v-bb18f006><!--[-->oauth<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-rgev" href="/blog/tags/?tag=github" data-v-372ae5d5 data-v-bb18f006><!--[-->github<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2026-02-04</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5><p>OAuth2.0是目前最流行的授权机制，用来授权第三方应用，获取用户数据。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/mcp.png" alt="MCP入门" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/jcojzdyt/" data-v-372ae5d5 data-v-bb18f006><!--[-->MCP入门<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-0bcd" href="/blog/tags/?tag=mcp" data-v-372ae5d5 data-v-bb18f006><!--[-->mcp<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2025-11-10</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>MCP 即模型上下文协议（Model Context Protocol），是 Anthropic 于 2024 年 11 月推出的开源开放标准协议，核心是为大模型与外部数据源、各类工具的交互制定统一 “规则”，就像 AI 应用领域的 USB - C 接口，通过客户端 - 服务器架构实现二者安全、高效的连接与上下文传递。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/monorepo.jpg" alt="monorepo工程管理" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/ofg4qazi/" data-v-372ae5d5 data-v-bb18f006><!--[-->monorepo工程管理<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-u79i" href="/blog/tags/?tag=工程管理" data-v-372ae5d5 data-v-bb18f006><!--[-->工程管理<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-ct4z" href="/blog/tags/?tag=monorepo" data-v-372ae5d5 data-v-bb18f006><!--[-->monorepo<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2025-10-10</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>随着前端工程越来越大，模块越来越多，代码复用性越来越强，模块之间的依赖关系也越来越复杂，导致开发效率低下，维护成本高，代码质量难以保证。因此，我们需要一种能够有效管理这些模块的工具，以便更好地组织和管理我们的代码。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/人脸识别.png" alt="face-api人脸识别" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/3w8p3uzb/" data-v-372ae5d5 data-v-bb18f006><!--[-->face-api人脸识别<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-rk83" href="/blog/tags/?tag=人脸识别" data-v-372ae5d5 data-v-bb18f006><!--[-->人脸识别<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-4lst" href="/blog/tags/?tag=人工智能" data-v-372ae5d5 data-v-bb18f006><!--[-->人工智能<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-5qpf" href="/blog/tags/?tag=机器学习" data-v-372ae5d5 data-v-bb18f006><!--[-->机器学习<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-11-22</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>在前端做关于人脸的项目就不得不提face-api.js，它是一个基于Javascript的开源库，用于在浏览器中进行人脸检测、识别和特征。它是建立在 TensorFlow.js 之上的，利用深度学习模型来实现各种人脸相关的功能。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/ai.png" alt="AI对话剖析实现" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/chint106/" data-v-372ae5d5 data-v-bb18f006><!--[-->AI对话剖析实现<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-4lst" href="/blog/tags/?tag=人工智能" data-v-372ae5d5 data-v-bb18f006><!--[-->人工智能<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-m2t6" href="/blog/tags/?tag=AI对话" data-v-372ae5d5 data-v-bb18f006><!--[-->AI对话<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-5qpf" href="/blog/tags/?tag=流式数据" data-v-372ae5d5 data-v-bb18f006><!--[-->流式数据<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-11-10</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>现在随着AI的发展，市面出现了很多AI对话的工具，正好这段时间也在做AI对话。其实功能不复杂，主要需要考虑的是细节、体验，跟我一起剖析AI对话是如何实现的。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/cli.png" alt="带你了解项目脚手架的开发过程" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/tgtykh82/" data-v-372ae5d5 data-v-bb18f006><!--[-->带你了解项目脚手架的开发过程<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-fig9" href="/blog/tags/?tag=Vue" data-v-372ae5d5 data-v-bb18f006><!--[-->Vue<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-tp8m" href="/blog/tags/?tag=脚手架开发" data-v-372ae5d5 data-v-bb18f006><!--[-->脚手架开发<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>每次开发新的项目，类型多样，有<code v-pre>vue</code>的、也有小程序的，虽然已经有各种类型的项目模板，但每次都需要去下载模板然后修改配置，就显得特别麻烦，于是开发一个脚手架去管理这些项目。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/文件上传.jpg" alt="最全的前端文件上传上新啦" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/x6wdefc2/" data-v-372ae5d5 data-v-bb18f006><!--[-->最全的前端文件上传上新啦<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-fig9" href="/blog/tags/?tag=Vue" data-v-372ae5d5 data-v-bb18f006><!--[-->Vue<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-bvhw" href="/blog/tags/?tag=文件上传" data-v-372ae5d5 data-v-bb18f006><!--[-->文件上传<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5><p>文件上传是项目中必不可少的功能，这里总结了一些常用的功能。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/玩转office.png" alt="前端玩转Office，Word、Excel" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/dxhmpp8j/" data-v-372ae5d5 data-v-bb18f006><!--[-->前端玩转Office，Word、Excel<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-fig9" href="/blog/tags/?tag=Vue" data-v-372ae5d5 data-v-bb18f006><!--[-->Vue<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-w052" href="/blog/tags/?tag=文件预览" data-v-372ae5d5 data-v-bb18f006><!--[-->文件预览<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>对于日常开发中后台系统项目中，肯定避免不了对文件的操作；文件上传、预览等功能。为了用户体验、交互，你也需要这些知识。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/lottie.png" alt="Lottie玩转页面动画" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/w82whf62/" data-v-372ae5d5 data-v-bb18f006><!--[-->Lottie玩转页面动画<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-fig9" href="/blog/tags/?tag=Vue" data-v-372ae5d5 data-v-bb18f006><!--[-->Vue<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-u79i" href="/blog/tags/?tag=Lottie" data-v-372ae5d5 data-v-bb18f006><!--[-->Lottie<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-ct4z" href="/blog/tags/?tag=动画" data-v-372ae5d5 data-v-bb18f006><!--[-->动画<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>前端页面为了美观、交互，会在页面加上一些交互动画。一般动画的实现方式有这几种</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/element.png" alt="Element日期选择器二开" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/nqwjwnk7/" data-v-372ae5d5 data-v-bb18f006><!--[-->Element日期选择器二开<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-0bcd" href="/blog/tags/?tag=ElementUI" data-v-372ae5d5 data-v-bb18f006><!--[-->ElementUI<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-kipb" href="/blog/tags/?tag=日期选择器" data-v-372ae5d5 data-v-bb18f006><!--[-->日期选择器<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>在做后台系统的项目中，日期组件用的是比较频繁的，但是一些常用的组件库没那么全。特别使用选择日期范围组件就格外明显。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/videoFrame.png" alt="canvas提取视频封面帧" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/bj3xc6e1/" data-v-372ae5d5 data-v-bb18f006><!--[-->canvas提取视频封面帧<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-fig9" href="/blog/tags/?tag=Vue" data-v-372ae5d5 data-v-bb18f006><!--[-->Vue<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-1k5m" href="/blog/tags/?tag=Canvas" data-v-372ae5d5 data-v-bb18f006><!--[-->Canvas<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-ct4z" href="/blog/tags/?tag=视频封面帧" data-v-372ae5d5 data-v-bb18f006><!--[-->视频封面帧<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>在做视频上传时一般会上传一张图片作为封面图，这时就可以获取视频的一些封面帧，选择一帧当作封面图；同样在页面展示的时候视频没有封面图，也可以通过这种方法去截取一帧图，提高用户体验。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/lp-vant-form.png" alt="lp-vant-form动态表单" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/dq0lji6l/" data-v-372ae5d5 data-v-bb18f006><!--[-->lp-vant-form动态表单<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-fig9" href="/blog/tags/?tag=微信小程序" data-v-372ae5d5 data-v-bb18f006><!--[-->微信小程序<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-4j34" href="/blog/tags/?tag=动态表单" data-v-372ae5d5 data-v-bb18f006><!--[-->动态表单<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5><p><code v-pre>lp-vant-form</code> 是一个可以通过 <code v-pre>JSON</code> 生成具有动态渲染、数据收集、验证和提交功能的表单生成组件。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover right" data-allow-mismatch data-v-0627f155 data-v-372ae5d5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-372ae5d5><img src="/hole-assets/cover/vue-echarts.png" alt="vue使用Echarts" loading="lazy" data-v-372ae5d5></div><div class="blog-post-item-content" data-v-372ae5d5><h3 data-v-372ae5d5><!----><!----><a class="vp-link no-icon link" href="/blog/l5mhb1q3/" data-v-372ae5d5 data-v-bb18f006><!--[-->vue使用Echarts<!--]--><!----></a></h3><div class="post-meta" data-v-372ae5d5><div class="category-list" data-v-372ae5d5><span class="icon vpi-folder" data-v-372ae5d5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=fa6808" data-v-372ae5d5 data-v-bb18f006><!--[-->技术文章<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-372ae5d5><span class="icon vpi-tag" data-v-372ae5d5></span><!--[--><a class="vp-link no-icon link tag vp-tag-fig9" href="/blog/tags/?tag=Vue" data-v-372ae5d5 data-v-bb18f006><!--[-->Vue<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-m2t6" href="/blog/tags/?tag=Echarts" data-v-372ae5d5 data-v-bb18f006><!--[-->Echarts<!--]--><!----></a><!--]--></div><div class="create-time" data-v-372ae5d5><span class="icon vpi-clock" data-v-372ae5d5></span><span data-v-372ae5d5>2024-05-16</span></div></div><div class="vp-doc excerpt" data-v-372ae5d5>
<p>在做后台系统以及关于数据分析处理的项目中，图表的功能就必不可少，而目前市场上Echarts的使用占比还是比较高的，如何灵活低成本使用就尤为重要。</p>
